<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="The Contact Us page gives customers easy ways to reach White Water Rafting, including contact details, a message form, and helpful extras like employee profiles and a map.">
    <meta name="author" content="Kwadwo Adu Nsiah Ahenkan">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.png" alt="white water rafting logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="contact-page">
        <section class="contact-info">
            <h1>White Rafting Company</h1>
            <h2>1272 Starlets 91 Rd</h2>
            <h2>Accra, Ghana</h2>
            <h2>+233 54 722 9292</h2>
            <h2>info@wwr.com</h2>
        </section>
        <section class="contact-layout">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3971.104959852509!2d-0.19191339999999996!3d5.5514554!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9085f7383c39%3A0x7c72cdef39372119!2sAccra%20Sports%20Stadium!5e0!3m2!1sen!2sgh!4v1775158443209!5m2!1sen!2sgh"
              allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

            <form class="contact-form">
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Placeholder">
                </div>

                <div class="form-row radio-row">
                    <label>Message Purpose</label>
                    <div class="radio-options">
                        <div>
                            <input type="radio" id="inquiry" name="purpose" value="inquiry">
                            <label for="inquiry">General Inquiry</label>
                        </div>
                        <div>
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            <label for="reservation">Reservation Question</label>
                        </div>
                        <div>
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            <label for="suggestion">Website Suggestion</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="employees">
            <h2>We Are Here To Serve You!</h2>
            <figure>
                <img src="images/curry.jpg" alt="photo of employee named Curry">
                <figcaption>CEO</figcaption>
            </figure>
            <figure>
                <img src="images/lebron.jpg" alt="photo of employee named Lebron">
                <figcaption>COO</figcaption>
            </figure>
            <figure>
                <img src="images/giannis.jpg" alt="photo of employee named Giannis">
                <figcaption>Operations Manager</figcaption>
            </figure>

        </section>
    </main>
    <footer>
        <p>©️2026 | White Water Rafting | Kwadwo Adu Nsiah Ahenkan</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="facebook logo">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram logo">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin logo">
            </a>

        </nav>
    </footer>

</body>

</html>
