<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAseball League Standing</title>
    <meta name="description"
      content="Kwadwo Adu Nsiah Ahenkan | wdd 130 - HTML structure and add the content as shown in the following rendered table using thead, tbody, and tfoot:">

    <link rel="stylesheet" href="styles/table.css">
</head>

<body>
    <table>
        <caption>Baseball League Standings</caption>

        <tbody>
            <tr>
                <td rowspan="2">Southern</td>
                <td>Parana</td>
                <td>52-19</td>
                <td>23</td>
            </tr>
            <tr>
                <td>Catarina</td>

                <td>10</td>
            </tr>
            <tr>
                <td rowspan="3">Western</td>
                <td>Lacerda</td>
                <td>92-70</td>
                <td>27</td>
            </tr>
            <td>Acre</td>
            <td>75-87</td>
            <td>20</td>
            <tr>
                <td>Rondonia</td>
                <td>10-7</td>
                <td>12</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Total Players</th>
                <td>92</td>
            </tr>
        </tfoot>
    </table>

</body>

</html>
