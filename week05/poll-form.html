<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <meta name="description" content="Poll Form">
    <meta name="author" content="Kwadwo Adu Nsiah Ahenkan">
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD | HTML Form - User Poll</h1>
    </header>
    <main>

        <form>
            <fieldset>
                <legend> Contact Information</legend>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
                <br>

                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" required>

            </fieldset>

            <fieldset>
                <legend>Questions</legend>
                <label for="browser">What is your favorite browser?</label>
                <select id="browser" name="browser">
                    <option value="Chrome">Chrome</option>
                    <option value="Mozilla Firefox">Mozilla Firefox</option>
                    <option value="Internet Explorer">Internet Explorer</option>
                </select>
                <br>

                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
                <br>

                <label for="feedback">List the places you have lived</label>
                <textarea id="feedback" name="feedback" rows="5"
                  placeholder="Accra, Kumasi, China, Indonesia"></textarea>
            </fieldset>

            <button type="submit">Submit Poll</button>

    </main>
    <footer>
        ©️2026 | HTML Form - User Poll Activity | Kwadwo Adu Nsiah Ahenkan
    </footer>

</body>

</html>
